name: 기능 구현 이슈
description: 기능을 단계별 수직 슬라이스로 구현하기 위한 이슈 템플릿입니다.
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        기능 PRD와 이슈 문서의 단계별 범위를 기준으로 작성합니다.
        한 이슈에는 사용자가 확인할 수 있는 하나의 수직 슬라이스만 포함합니다.
        제목에는 [feature], [Feature] 같은 타입 prefix를 붙이지 않습니다.
        라벨은 feature와 docs/features/ 하위 기능명(tag, search 등) 중 하나를 함께 지정합니다.

  - type: textarea
    id: summary
    attributes:
      label: 구현 요약
      description: 이 이슈에서 완성할 사용자 관점의 동작을 간단히 설명해주세요.
      placeholder: '사용자가 저장된 데이터를 화면에서 확인할 수 있게 한다.'
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 구현 범위
      description: 이번 이슈에서 구현할 범위를 체크리스트로 작성해주세요.
      value: |
        - [ ] 
        - [ ]
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: Given/When/Then 형식으로 검증 가능한 완료 조건을 작성해주세요.
      value: |
        - [ ] Given 
          When 
          Then
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: 제외 범위
      description: 이번 이슈에서 의도적으로 하지 않을 작업을 작성해주세요.
      value: |
        -
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 의존성
      description: 선행 이슈나 함께 머지되어야 하는 다른 이슈만 작성해주세요. 기획 문서는 의존성에 포함하지 않습니다.
      placeholder: '없음'
    validations:
      required: false
